<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=960, height=800, initial-scale=1.0">
    <title>SSM Manager</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Inter:400,500,700&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ cache_version }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body{% if native %} class="native"{% endif %}>
    <div class="app-container">
        <aside class="sidebar expanded">
            <div class="sidebar-header">
                <div class="ssm-title">
                    <span class="ssm-icon-bg">
                        <i class="fa-solid fa-shield-halved ssm-icon"></i>
                    </span>
                    <span>SSM Manager</span>
                </div>
                <button class="hamburger" id="hamburgerBtn" aria-label="Toggle sidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-pane" id="dashboardPane">
                    <span class="sidebar-icon"><i class="fa-solid fa-house"></i></span>
                    Dashboard
                </div>
                <div class="sidebar-pane" id="configPane">
                    <span class="sidebar-icon"><i class="fa-solid fa-network-wired"></i></span>
                    Connections
                </div>
                <div class="sidebar-pane" id="logsPane">
                    <span class="sidebar-icon"><i class="fa-solid fa-scroll"></i></span>
                    Logs
                </div>
                <div class="sidebar-pane" id="advancedPane">
                    <span class="sidebar-icon"><i class="fa-solid fa-flask"></i></span>
                    Advanced
                </div>
                <div class="sidebar-pane" id="settingsPane">
                    <span class="sidebar-icon"><i class="fa-solid fa-gear"></i></span>
                    Settings
                </div>
            </div>
            <div class="sidebar-section sessions-section">
                <div class="sessions-group">
                    <div class="sessions-group-title">
                        <i class="fa-solid fa-tower-broadcast sessions-group-icon active"></i>
                        Active Sessions
                        <span class="sessions-count" id="activeCount">0</span>
                        <button class="sidebar-refresh-all-btn" id="refreshAllBtn" title="Refresh all sessions">
                            <i class="fa-solid fa-arrows-rotate"></i>
                        </button>
                    </div>
                    <div class="sidebar-session-list" id="activeSessions">
                        <!-- Active sessions will be moved here by JS -->
                    </div>
                </div>
                <div class="sessions-group">
                    <div class="sessions-group-title">
                        <i class="fa-solid fa-plug sessions-group-icon available"></i>
                        Available
                    </div>
                    <div class="sidebar-session-list" id="availableSessions">
                        <!-- Available sessions populated by JS -->
                    </div>
                </div>
                <div class="sidebar-new-connection" id="newConnectionBtn">
                    <i class="fa-solid fa-plus"></i>
                    <span>New Connection</span>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <div class="main-topbar">
                <span class="main-topbar-title" id="mainTopbarTitle">Dashboard</span>
            </div>
            <div class="main-content-body" id="mainContentBody">
                <!-- Pane content rendered by JS -->
            </div>
            <div class="console-panel" id="consolePanel">
                <div class="console-header">
                    <button class="tabs-arrow tabs-arrow-left" id="tabsArrowLeft" title="Scroll tabs left"><i class="fa-solid fa-chevron-left"></i></button>
                    <div class="console-tabs" id="consoleTabs"></div>
                    <button class="tabs-arrow tabs-arrow-right" id="tabsArrowRight" title="Scroll tabs right"><i class="fa-solid fa-chevron-right"></i></button>
                    <div class="console-actions">
                        <button class="conn-action-btn" id="consoleRefreshBtn" title="Refresh logs"><i class="fa-solid fa-arrows-rotate"></i></button>
                        <button class="conn-action-btn" id="consoleSaveBtn" title="Save logs"><i class="fa-solid fa-floppy-disk"></i></button>
                        <button class="conn-action-btn" id="consoleCopyBtn" title="Copy logs"><i class="fa-solid fa-copy"></i></button>
                    </div>
                </div>
                <div class="console-body" id="consoleBody">
                    <div class="console-empty">No session selected</div>
                </div>
            </div>
        </main>
    </div>

    <button id="debugSpawnTab">+</button>

    <script>
        // Sessions fetched from API at runtime
        let sessions = [];
    </script>
    <script src="{{ url_for('static', filename='script.js') }}?v={{ cache_version }}"></script>
</body>
</html>
