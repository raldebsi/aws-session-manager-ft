<div class="dashboard-pane">
    <div class="dashboard-stats" id="dashboardStats">
        <div class="stat-card">
            <div class="stat-value" id="statActive">-</div>
            <div class="stat-label">Active</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statTotal">-</div>
            <div class="stat-label">Sessions</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statConnections">-</div>
            <div class="stat-label">Connections</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statErrors">-</div>
            <div class="stat-label">Errors</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statRegions">-</div>
            <div class="stat-label">Regions</div>
        </div>
    </div>
    <div class="dashboard-toolbar">
        <div class="dashboard-search">
            <i class="fa-solid fa-magnifying-glass dashboard-search-icon"></i>
            <input class="form-input dashboard-search-input" id="dashboardSearch" type="text" placeholder="Search sessions..." />
        </div>
        <div class="dashboard-view-toggle">
            <button class="view-btn active" id="viewGrouped" title="Grouped by connection" data-view="grouped">
                <i class="fa-solid fa-layer-group"></i>
            </button>
            <button class="view-btn" id="viewRegion" title="Grouped by region" data-view="region">
                <i class="fa-solid fa-globe"></i>
            </button>
            <button class="view-btn" id="viewAll" title="All sessions" data-view="all">
                <i class="fa-solid fa-grip"></i>
            </button>
        </div>
    </div>
    <div id="dashboardContent"></div>
</div>
